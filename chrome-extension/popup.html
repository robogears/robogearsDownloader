<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <strong>robogears</strong>
            <span class="ext-version" id="ext-version"></span>
        </div>
        <span id="status-dot" class="dot" title="Checking…"></span>
    </div>
    <p class="hint">Paste the token from the desktop app's <strong>Settings → Extension</strong> tab.</p>
    <input id="token-input" type="text" placeholder="32-character hex token" spellcheck="false" autocomplete="off">
    <div class="row">
        <button id="save-btn" class="primary">Save</button>
        <span id="status" class="status"></span>
    </div>

    <div class="reload-section" id="reload-section" hidden>
        <div class="reload-row">
            <div class="reload-info">
                <div class="reload-title" id="reload-title"></div>
                <div class="reload-sub" id="reload-sub"></div>
            </div>
            <button id="reload-btn" class="primary reload-btn">Reload</button>
        </div>
        <div class="reload-hint" id="reload-hint" hidden></div>
    </div>

    <a id="open-options" class="footer-link" href="#">Open full settings →</a>
    <script src="popup.js"></script>
</body>
</html>
